name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            build_flag: --x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            build_flag: --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # AppImage needs libfuse2 on Ubuntu 22+
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2 rpm

      - name: Build & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.publish }}" == "true" ]]; then
            npx electron-builder --linux ${{ matrix.build_flag }} --publish always
          else
            npx electron-builder --linux ${{ matrix.build_flag }} --publish never
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiberquest-linux-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: warn
