<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; connect-src ws://localhost:*">
<title>FiberQuest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #111;
    --green: #39ff14; --cyan: #00e5ff; --red: #ff2052;
    --yellow: #ffe600; --purple: #c77dff;
    --text: #e0e0e0; --muted: #555;
    --border: #222;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 1.6; min-height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1.5rem;
    border-bottom: 2px solid var(--green);
    background: #050505;
  }
  .logo { color: var(--green); font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 12px var(--green); }
  .logo span { color: var(--cyan); }
  .node-status { display: flex; align-items: center; gap: .5rem; font-size: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 46px); }

  /* ── Sidebar ── */
  .sidebar {
    background: #080808; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .sidebar-section { padding: 1rem; border-bottom: 1px solid var(--border); }
  .sidebar-title { color: var(--muted); font-size: 7px; letter-spacing: 2px; margin-bottom: .75rem; text-transform: uppercase; }

  /* Channel card */
  .channel-card { background: #111; border: 1px solid var(--border); border-radius: 4px; padding: .6rem; margin-bottom: .5rem; }
  .channel-card .peer { color: var(--cyan); font-size: 8px; margin-bottom: .3rem; }
  .channel-balances { display: flex; justify-content: space-between; font-size: 7px; }
  .channel-balances .local { color: var(--green); }
  .channel-balances .remote { color: var(--muted); }
  .channel-state { font-size: 6px; color: var(--yellow); margin-top: .2rem; }

  /* Payment ticker */
  .payment-item { display: flex; justify-content: space-between; align-items: center; padding: .3rem 0; border-bottom: 1px solid #1a1a1a; font-size: 7px; }
  .payment-item .amount { color: var(--green); }
  .payment-item .type { color: var(--muted); }
  .payment-flash { animation: flash 0.5s ease; }
  @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0; background: rgba(57,255,20,.2); } }

  /* ── Main content ── */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: #090909; }
  .tab { padding: .75rem 1.25rem; font-size: 8px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab:hover { color: var(--text); }

  /* Panel */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 1.5rem; }
  .panel.active { display: block; }

  /* ── Lobby panel ── */
  .lobby-header { text-align: center; padding: 2rem 0 1.5rem; }
  .lobby-header h2 { color: var(--green); font-size: 16px; text-shadow: 0 0 20px var(--green); margin-bottom: .5rem; }
  .lobby-header p { color: var(--muted); font-size: 8px; }

  .connect-form { max-width: 400px; margin: 1.5rem auto; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; color: var(--muted); font-size: 7px; margin-bottom: .4rem; }
  .field input { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: inherit; font-size: 9px; padding: .5rem; outline: none; }
  .field input:focus { border-color: var(--green); }

  .btn { background: transparent; border: 2px solid var(--green); color: var(--green); font-family: inherit; font-size: 9px; padding: .6rem 1.25rem; cursor: pointer; transition: all .15s; text-transform: uppercase; }
  .btn:hover { background: var(--green); color: var(--bg); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: var(--bg); }

  /* ── Game table ── */
  .table-area {
    position: relative; background: #0a1a0a;
    border: 2px solid var(--green); border-radius: 50%;
    width: 500px; height: 280px; margin: 1.5rem auto;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(57,255,20,.15);
  }
  .pot { text-align: center; }
  .pot-label { font-size: 7px; color: var(--muted); }
  .pot-value { font-size: 20px; color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }

  .player-seat {
    position: absolute; background: #111; border: 1px solid var(--border);
    border-radius: 4px; padding: .5rem .75rem; font-size: 7px; min-width: 80px; text-align: center;
  }
  .player-seat.active-turn { border-color: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .player-seat .pname { color: var(--cyan); margin-bottom: .2rem; }
  .player-seat .pchips { color: var(--green); }
  .player-seat .pcards { color: var(--muted); font-size: 8px; margin-top: .2rem; }
  /* Seat positions */
  .seat-0 { bottom: -2rem; left: 50%; transform: translateX(-50%); }  /* you */
  .seat-1 { top: -2rem; left: 50%; transform: translateX(-50%); }     /* opponent */
  .seat-2 { left: -5rem; top: 50%; transform: translateY(-50%); }
  .seat-3 { right: -5rem; top: 50%; transform: translateY(-50%); }

  .community-cards { display: flex; gap: .5rem; }
  .card { background: #fff; color: #000; border-radius: 3px; padding: .2rem .4rem; font-size: 11px; font-family: monospace; font-weight: bold; min-width: 28px; text-align: center; }
  .card.red { color: #c00; }
  .card.hidden { background: #333; color: #333; }

  /* Action bar */
  .action-bar { display: flex; gap: .75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }

  /* ── Payment panel ── */
  .payment-log { max-width: 600px; }
  .payment-row { display: flex; justify-content: space-between; align-items: center; padding: .5rem; border-bottom: 1px solid var(--border); font-size: 8px; }
  .payment-row .pamount { color: var(--green); font-size: 11px; }
  .payment-row .ptype { color: var(--yellow); }
  .payment-row .pts { color: var(--muted); font-size: 7px; }

  /* Invoice QR modal */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-box { background: #111; border: 2px solid var(--green); border-radius: 4px; padding: 2rem; max-width: 400px; width: 90%; text-align: center; }
  .modal-box h3 { color: var(--green); margin-bottom: 1rem; font-size: 10px; }
  .invoice-string { background: #000; border: 1px solid var(--border); border-radius: 2px; padding: .75rem; font-size: 7px; color: var(--cyan); word-break: break-all; margin: 1rem 0; font-family: monospace; }
  .modal-box p { color: var(--muted); font-size: 7px; margin-bottom: 1rem; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 2rem; padding: .75rem 1.5rem; border-top: 1px solid var(--border); background: #090909; font-size: 8px; }
  .stat { display: flex; flex-direction: column; gap: .2rem; }
  .stat-label { color: var(--muted); font-size: 6px; }
  .stat-value { color: var(--cyan); }
</style>
</head>
<body>

<header>
  <div class="logo">FIBER<span>QUEST</span></div>
  <div class="node-status">
    <div class="dot" id="fiberDot"></div>
    <span id="fiberStatus">Connecting...</span>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Channels</div>
      <div id="channelList"><div style="color:var(--muted);font-size:7px">Loading...</div></div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-title">Live Payments</div>
      <div id="paymentTicker"></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="lobby">🎮 Lobby</div>
      <div class="tab" data-tab="game">♠ Table</div>
      <div class="tab" data-tab="payments">⚡ Payments</div>
    </div>

    <!-- Lobby -->
    <div class="panel active" id="panel-lobby">
      <div class="lobby-header">
        <h2>FIBERQUEST</h2>
        <p>Texas Hold'em · Powered by Fiber Network micropayments</p>
      </div>
      <div class="connect-form">
        <div class="field">
          <label>Your Name</label>
          <input type="text" id="playerName" placeholder="SatoshiDealer" maxlength="16">
        </div>
        <div class="field">
          <label>Game Server</label>
          <input type="text" id="serverUrl" value="ws://localhost:8765" placeholder="ws://localhost:8765">
        </div>
        <div class="field">
          <label>Your Fiber Node ID (optional)</label>
          <input type="text" id="fiberNodeId" placeholder="03abc...">
        </div>
        <button class="btn" onclick="connectToGame()">JOIN TABLE →</button>
      </div>
    </div>

    <!-- Game table -->
    <div class="panel" id="panel-game">
      <div class="table-area">
        <div class="pot">
          <div class="pot-label">POT</div>
          <div class="pot-value" id="potValue">0</div>
          <div class="community-cards" id="communityCards" style="margin-top:.5rem;justify-content:center"></div>
        </div>
        <div id="playerSeats"></div>
      </div>
      <div class="action-bar" id="actionBar" style="display:none">
        <button class="btn danger" onclick="sendAction('FOLD')">FOLD</button>
        <button class="btn" onclick="sendAction('CHECK')">CHECK</button>
        <button class="btn" onclick="sendAction('CALL')">CALL</button>
        <button class="btn" onclick="sendAction('RAISE', 20)">RAISE</button>
      </div>
    </div>

    <!-- Payments log -->
    <div class="panel" id="panel-payments">
      <div class="payment-log" id="paymentLog">
        <div style="color:var(--muted);font-size:8px;padding:1rem">No payments yet this session.</div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat"><span class="stat-label">NODE</span><span class="stat-value" id="statNode">—</span></div>
      <div class="stat"><span class="stat-label">CHANNELS</span><span class="stat-value" id="statChannels">—</span></div>
      <div class="stat"><span class="stat-label">SESSION PAID</span><span class="stat-value" id="statPaid">0 CKB</span></div>
      <div class="stat"><span class="stat-label">PHASE</span><span class="stat-value" id="statPhase">—</span></div>
    </div>
  </div>
</div>

<!-- Invoice payment modal -->
<div class="modal" id="payModal">
  <div class="modal-box">
    <h3 id="modalTitle">PAYMENT REQUIRED</h3>
    <p id="modalDesc">Scan or pay this Fiber invoice:</p>
    <div class="invoice-string" id="modalInvoice"></div>
    <p id="modalAmount" style="color:var(--yellow);font-size:10px"></p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn" onclick="confirmPayment()">✓ PAID</button>
      <button class="btn danger" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ws = null;
let myPlayerId = null;
let gameState = null;
let sessionPaid = 0;
let pendingPayment = null;

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Fiber node status ─────────────────────────────────────────────────────
async function initFiber() {
  try {
    const info = await window.fiberquest.fiber.nodeInfo();
    document.getElementById('fiberDot').classList.add('online');
    document.getElementById('fiberStatus').textContent = 'Fiber connected';
    const nodeId = (info.node_id || '').slice(0, 12) + '…';
    document.getElementById('statNode').textContent = nodeId;

    const chans = await window.fiberquest.fiber.listChannels();
    const list = chans.channels || chans || [];
    document.getElementById('statChannels').textContent = list.length;
    renderChannels(list);

    setInterval(pollFiber, 15000);
  } catch(e) {
    document.getElementById('fiberStatus').textContent = 'No Fiber node';
    document.getElementById('statNode').textContent = 'offline';
  }
}

async function pollFiber() {
  try {
    const chans = await window.fiberquest.fiber.listChannels();
    const list = chans.channels || chans || [];
    document.getElementById('statChannels').textContent = list.length;
    renderChannels(list);
  } catch {}
}

function renderChannels(channels) {
  const el = document.getElementById('channelList');
  if (!channels.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:7px">No open channels</div>';
    return;
  }
  el.innerHTML = channels.map(c => {
    const local  = (Number(BigInt(c.local_balance  || '0x0')) / 1e8).toFixed(2);
    const remote = (Number(BigInt(c.remote_balance || '0x0')) / 1e8).toFixed(2);
    const peer   = (c.peer_id || c.channel_id || '').slice(0, 16) + '…';
    return `<div class="channel-card">
      <div class="peer">${peer}</div>
      <div class="channel-balances">
        <span class="local">↑ ${local} CKB</span>
        <span class="remote">↓ ${remote} CKB</span>
      </div>
      <div class="channel-state">${c.state?.state_name || c.status || 'OPEN'}</div>
    </div>`;
  }).join('');
}

// ── Game connection ────────────────────────────────────────────────────────
function connectToGame() {
  const name   = document.getElementById('playerName').value.trim() || 'Player';
  const url    = document.getElementById('serverUrl').value.trim();
  const nodeId = document.getElementById('fiberNodeId').value.trim();

  ws = new WebSocket(url);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'FGSP_CONNECT', name, fiberNodeId: nodeId || null }));
  };
  ws.onmessage = (e) => handleServerMsg(JSON.parse(e.data));
  ws.onerror   = (e) => console.error('WS error', e);
  ws.onclose   = ()  => { document.getElementById('statPhase').textContent = 'DISCONNECTED'; };
}

function handleServerMsg(msg) {
  switch (msg.type) {
    case 'FGSP_WELCOME':
      myPlayerId = msg.playerId;
      showTab('game');
      break;

    case 'FGSP_GAME_STATE_UPDATE':
      gameState = msg;
      renderGameState(msg);
      document.getElementById('statPhase').textContent = msg.phase || '—';
      break;

    case 'FGSP_PAYMENT_REQUEST':
      showPaymentModal(msg);
      break;
  }
}

function renderGameState(state) {
  // Pot
  document.getElementById('potValue').textContent = (state.pot || 0) + ' CKB';

  // Community cards
  const cc = document.getElementById('communityCards');
  const cards = state.communityCards || [];
  cc.innerHTML = cards.length
    ? cards.map(c => `<div class="card ${c.includes('♥')||c.includes('♦')?'red':''}">${c}</div>`).join('')
    : '<div style="color:var(--muted);font-size:7px">—</div>';

  // Player seats
  const seatsEl = document.getElementById('playerSeats');
  const players = Object.entries(state.players || {});
  seatsEl.innerHTML = players.map(([id, p], i) => `
    <div class="player-seat seat-${i} ${state.currentPlayer === id ? 'active-turn' : ''}">
      <div class="pname">${p.name}${id === myPlayerId ? ' (you)' : ''}</div>
      <div class="pchips">${p.chips} CKB</div>
      <div class="pcards">${(p.cards||[]).join(' ')}</div>
    </div>
  `).join('');

  // Action bar — show only on your turn
  const actionBar = document.getElementById('actionBar');
  actionBar.style.display = state.currentPlayer === myPlayerId ? 'flex' : 'none';

  // Payment ticker (recent payments)
  if (state.payments && state.payments.length) {
    const ticker = document.getElementById('paymentTicker');
    ticker.innerHTML = [...state.payments].reverse().slice(0, 10).map(p =>
      `<div class="payment-item payment-flash">
        <span class="type">${p.type}</span>
        <span class="amount">+${p.amount_ckb} CKB</span>
      </div>`
    ).join('');
  }

  // Stats
  document.getElementById('statPaid').textContent = sessionPaid + ' CKB';
}

function sendAction(action, amount) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'FGSP_PLAYER_ACTION', action, amount }));
}

// ── Payment modal ──────────────────────────────────────────────────────────
function showPaymentModal(req) {
  pendingPayment = req;
  document.getElementById('modalTitle').textContent =
    req.type === 'BUY_IN' ? '💰 BUY-IN REQUIRED' : `⚡ ${req.type} PAYMENT`;
  document.getElementById('modalDesc').textContent = req.description;
  document.getElementById('modalInvoice').textContent = req.invoice;
  document.getElementById('modalAmount').textContent = req.amount_ckb + ' CKB';
  document.getElementById('payModal').classList.add('open');
}

async function confirmPayment() {
  if (!pendingPayment || !ws) return;
  // In full version: send payment via Fiber, get hash
  // For now: optimistic confirmation
  sessionPaid += pendingPayment.amount_ckb || 0;
  ws.send(JSON.stringify({
    type: 'FGSP_PAYMENT_CONFIRM',
    paymentHash: '0x' + Math.random().toString(16).slice(2).padEnd(64, '0'),
    amount_ckb: pendingPayment.amount_ckb,
  }));

  // Also actually send via Fiber if invoice available
  if (pendingPayment.invoice && window.fiberquest) {
    try {
      await window.fiberquest.fiber.sendPayment(pendingPayment.invoice);
    } catch(e) {
      console.warn('Fiber payment failed:', e.message);
    }
  }

  closeModal();
}

function closeModal() {
  document.getElementById('payModal').classList.remove('open');
  pendingPayment = null;
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
}

// ── Boot ──────────────────────────────────────────────────────────────────
if (window.fiberquest) {
  initFiber();
} else {
  // Running in browser (not Electron) — show warning
  document.getElementById('fiberStatus').textContent = 'Browser mode (no Fiber)';
}
</script>
</body>
</html>
