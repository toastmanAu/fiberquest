<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
<title>FiberQuest Tournament Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #111; --dark: #050505;
    --green: #39ff14; --cyan: #00e5ff; --red: #ff2052;
    --yellow: #ffe600; --purple: #c77dff;
    --text: #e0e0e0; --muted: #555;
    --border: #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 2px solid var(--green);
    background: var(--dark);
    height: 50px;
  }

  .logo {
    color: var(--green);
    font-size: 14px;
    letter-spacing: 2px;
    text-shadow: 0 0 12px var(--green);
  }

  .logo span { color: var(--cyan); }

  .status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 8px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .dot.online {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  /* Main container */
  .app {
    height: calc(100vh - 50px);
    position: relative;
    overflow: hidden;
  }

  /* Views */
  .view {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    overflow-y: auto;
    padding: 2rem;
  }

  .view.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── View 1: Setup ── */
  .setup-form {
    width: 100%;
    max-width: 400px;
  }

  .form-title {
    text-align: center;
    color: var(--green);
    font-size: 16px;
    text-shadow: 0 0 20px var(--green);
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    color: var(--muted);
    font-size: 7px;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .form-control {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 0.6rem 0.8rem;
    border-radius: 2px;
    outline: none;
  }

  .form-control:focus {
    border-color: var(--green);
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .btn {
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: var(--green);
    color: var(--bg);
  }

  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }

  .btn.danger:hover {
    background: var(--red);
    color: var(--bg);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── View 2: Waiting Room ── */
  .waiting-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .waiting-title {
    color: var(--green);
    font-size: 16px;
    text-shadow: 0 0 20px var(--green);
    margin-bottom: 0.5rem;
  }

  .tournament-id {
    color: var(--cyan);
    font-size: 8px;
    margin-bottom: 0.5rem;
  }

  .status-text {
    color: var(--yellow);
    font-size: 8px;
  }

  .player-slots {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 600px;
    margin: 2rem 0;
  }

  .player-slot {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    text-align: center;
  }

  .player-slot.active {
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(57, 255, 20, 0.3);
  }

  .slot-input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 0.5rem;
    margin-bottom: 0.75rem;
    border-radius: 2px;
    outline: none;
  }

  .slot-input:focus {
    border-color: var(--cyan);
  }

  .slot-button {
    width: 100%;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 0.4rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .slot-button:hover {
    background: var(--cyan);
    color: var(--bg);
  }

  .slot-status {
    font-size: 8px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .slot-status.paid {
    color: var(--green);
  }

  .invoice-box {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.5rem;
    margin-top: 0.5rem;
    max-height: 80px;
    overflow: hidden;
  }

  .invoice-text {
    font-size: 5px;
    color: var(--cyan);
    font-family: monospace;
    word-break: break-all;
    white-space: pre-wrap;
    margin-bottom: 0.3rem;
  }

  .invoice-copy {
    width: 100%;
    font-size: 6px;
    padding: 0.2rem;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    cursor: pointer;
  }

  /* ── View 3: Live ── */
  .live-header {
    text-align: center;
    margin-bottom: 2rem;
    color: var(--green);
    font-size: 14px;
    text-shadow: 0 0 20px var(--green);
  }

  .live-subheader {
    color: var(--muted);
    font-size: 8px;
    margin-top: 0.5rem;
  }

  .vs-container {
    display: flex;
    align-items: center;
    gap: 3rem;
    margin: 2rem 0;
    width: 100%;
    max-width: 600px;
  }

  .player-live {
    flex: 1;
    text-align: center;
  }

  .player-name-live {
    color: var(--cyan);
    font-size: 11px;
    margin-bottom: 0.75rem;
  }

  .health-bar {
    background: var(--dark);
    border: 1px solid var(--border);
    height: 20px;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }

  .health-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    transition: width 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 7px;
    font-weight: bold;
  }

  .vs-divider {
    color: var(--green);
    font-size: 20px;
    font-weight: bold;
  }

  .timer {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--yellow);
    font-size: 12px;
    text-shadow: 0 0 12px var(--yellow);
  }

  .timer-label {
    font-size: 8px;
    color: var(--muted);
  }

  .live-controls {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  /* ── View 4: Results ── */
  .results-header {
    color: var(--green);
    font-size: 18px;
    text-shadow: 0 0 30px var(--green);
    margin-bottom: 1rem;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .winner-name {
    color: var(--yellow);
    font-size: 14px;
    text-shadow: 0 0 20px var(--yellow);
    margin-bottom: 2rem;
  }

  .scoreboard {
    background: var(--surface);
    border: 2px solid var(--green);
    border-radius: 4px;
    padding: 1.5rem;
    max-width: 500px;
    margin: 1rem 0;
    width: 100%;
  }

  .score-row {
    display: grid;
    grid-template-columns: 60px 1fr 80px 100px;
    gap: 1rem;
    padding: 0.75rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 8px;
  }

  .score-row:last-child {
    border-bottom: none;
  }

  .score-rank {
    color: var(--yellow);
    font-weight: bold;
  }

  .score-name {
    color: var(--cyan);
    word-break: break-all;
  }

  .score-value {
    text-align: right;
    color: var(--green);
  }

  .score-payout {
    text-align: right;
    color: var(--purple);
  }

  .results-actions {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FIBER<span>QUEST</span></div>
  <div class="status">
    <div class="dot" id="fiberDot"></div>
    <span id="fiberStatus">Connecting...</span>
  </div>
</header>

<div class="app">

  <!-- View 1: Setup Tournament -->
  <div class="view active" id="view-setup">
    <div class="setup-form">
      <div class="form-title">🎮 SETUP TOURNAMENT</div>

      <div class="form-group">
        <label class="form-label">Game</label>
        <select class="form-control" id="gameSelect" onchange="updateModes()">
          <option>Loading games...</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Tournament Mode</label>
        <select class="form-control" id="modeSelect">
          <option>Select game first</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Entry Fee (CKB)</label>
          <input type="number" class="form-control" id="entryFee" value="10" min="1" max="1000">
        </div>
        <div class="form-group">
          <label class="form-label">Players</label>
          <select class="form-control" id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Time Limit (min)</label>
          <input type="number" class="form-control" id="timeLimit" value="10" min="1" max="60">
        </div>
        <div class="form-group">
          <label class="form-label">Currency</label>
          <select class="form-control" id="currency">
            <option value="Fibt">Fibt (testnet)</option>
            <option value="Fibb">Fibb (mainnet)</option>
          </select>
        </div>
      </div>

      <button class="btn" onclick="startSetup()" style="width:100%;margin-top:2rem">
        CREATE TOURNAMENT →
      </button>
    </div>
  </div>

  <!-- View 2: Waiting Room -->
  <div class="view" id="view-waiting">
    <div class="waiting-header">
      <div class="waiting-title">⏳ WAITING ROOM</div>
      <div class="tournament-id" id="tourId"></div>
      <div class="status-text" id="waitStatus"></div>
    </div>
    <div class="player-slots" id="playerSlots"></div>
    <button class="btn danger" onclick="goBack()">← BACK</button>
  </div>

  <!-- View 3: Live Tournament -->
  <div class="view" id="view-live">
    <div class="live-header">
      <div id="gameNameLive">Game</div>
      <div class="live-subheader" id="modeLive"></div>
    </div>
    <div class="timer">
      <div class="timer-label">ELAPSED</div>
      <div id="timerValue">0:00</div>
    </div>
    <div class="vs-container">
      <div class="player-live">
        <div class="player-name-live" id="p1NameLive">Player 1</div>
        <div class="health-bar">
          <div class="health-fill" id="p1Health" style="width:100%">100%</div>
        </div>
      </div>
      <div class="vs-divider">VS</div>
      <div class="player-live">
        <div class="player-name-live" id="p2NameLive">Player 2</div>
        <div class="health-bar">
          <div class="health-fill" id="p2Health" style="width:100%">100%</div>
        </div>
      </div>
    </div>
    <div class="live-controls">
      <button class="btn danger" onclick="endTournament()">END TOURNAMENT</button>
    </div>
  </div>

  <!-- View 4: Results -->
  <div class="view" id="view-results">
    <div class="results-header">🏆 WINNER!</div>
    <div class="winner-name" id="winnerName">—</div>
    <div class="scoreboard" id="scoreboardContent"></div>
    <div class="results-actions">
      <button class="btn" onclick="goToSetup()">NEW TOURNAMENT →</button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────

// State
let currentTournament = null;
let gamesList = [];
let timerInterval = null;

// ─────────────────────────────────────────────────────────────────────────

// Initialize
async function init() {
  // Load games
  try {
    gamesList = await window.fiberquest.games.list();
    populateGameSelect();
  } catch (e) {
    console.error('Failed to load games:', e);
  }

  // Check Fiber node
  try {
    const info = await window.fiberquest.fiber.nodeInfo();
    document.getElementById('fiberDot').classList.add('online');
    document.getElementById('fiberStatus').textContent = 'Fiber ready';
  } catch (e) {
    document.getElementById('fiberStatus').textContent = 'No Fiber node';
  }

  // Listen for tournament events
  window.fiberquest.tournament.onEvent(handleTournamentEvent);
}

function populateGameSelect() {
  const select = document.getElementById('gameSelect');
  select.innerHTML = gamesList.map(g =>
    `<option value="${g.id}">${g.name} (${g.system})</option>`
  ).join('');
  updateModes();
}

function updateModes() {
  const gameId = document.getElementById('gameSelect').value;
  const game = gamesList.find(g => g.id === gameId);
  const modes = game?.tournament_modes || [];
  const select = document.getElementById('modeSelect');
  select.innerHTML = modes.map(m =>
    `<option value="${m.id}">${m.name}</option>`
  ).join('');
}

// ─────────────────────────────────────────────────────────────────────────

// View transitions
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

function goBack() {
  showView('view-setup');
}

function goToSetup() {
  currentTournament = null;
  showView('view-setup');
}

// ─────────────────────────────────────────────────────────────────────────

// View 1: Setup
async function startSetup() {
  const gameId = document.getElementById('gameSelect').value;
  const mode = document.getElementById('modeSelect').value;
  const entryFee = parseInt(document.getElementById('entryFee').value) || 10;
  const players = parseInt(document.getElementById('playerCount').value) || 2;
  const timeLimit = parseInt(document.getElementById('timeLimit').value) || 10;
  const currency = document.getElementById('currency').value;

  try {
    const status = await window.fiberquest.tournament.create({
      gameId,
      mode,
      entryFee,
      players,
      timeLimitMinutes: timeLimit,
      currency,
    });

    currentTournament = status;
    showWaitingRoom();
  } catch (e) {
    alert('Error creating tournament: ' + e.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────

// View 2: Waiting Room
function showWaitingRoom() {
  const t = currentTournament;
  document.getElementById('tourId').textContent = `ID: ${t.id}`;
  document.getElementById('waitStatus').textContent = `Waiting for ${t.players} players...`;

  const slotsEl = document.getElementById('playerSlots');
  slotsEl.innerHTML = Array(t.players).fill(null).map((_, i) =>
    `<div class="player-slot" id="slot-${i}">
      <input type="text" class="slot-input" id="name-${i}" placeholder="Player ${i+1}">
      <button class="slot-button" onclick="addPlayer(${i})">ADD PLAYER</button>
      <div class="slot-status" id="status-${i}">Waiting...</div>
      <div class="invoice-box" id="invoice-${i}" style="display:none">
        <div class="invoice-text" id="invoiceText-${i}"></div>
        <button class="invoice-copy" onclick="copyInvoice(${i})">COPY</button>
      </div>
    </div>`
  ).join('');

  showView('view-waiting');
}

async function addPlayer(slotIndex) {
  const name = document.getElementById(`name-${slotIndex}`).value.trim();
  if (!name) {
    alert('Please enter a name');
    return;
  }

  try {
    const playerId = `player-${slotIndex}`;
    const result = await window.fiberquest.tournament.addPlayer(currentTournament.id, playerId, name);

    // Show invoice
    document.getElementById(`status-${slotIndex}`).textContent = 'Invoice ready';
    document.getElementById(`invoice-${slotIndex}`).style.display = 'block';
    document.getElementById(`invoiceText-${slotIndex}`).textContent = result.entryInvoice || '(invoice)';
    document.getElementById(`slot-${slotIndex}`).classList.add('active');

    // Disable input
    document.getElementById(`name-${slotIndex}`).disabled = true;
    document.querySelector(`#slot-${slotIndex} .slot-button`).disabled = true;
  } catch (e) {
    alert('Error adding player: ' + e.message);
  }
}

function copyInvoice(slotIndex) {
  const text = document.getElementById(`invoiceText-${slotIndex}`).textContent;
  navigator.clipboard.writeText(text).then(() => {
    alert('Invoice copied!');
  });
}

// ─────────────────────────────────────────────────────────────────────────

// View 3: Live
async function showLive() {
  const t = currentTournament;
  const game = gamesList.find(g => g.id === t.game);
  const mode = game?.tournament_modes?.find(m => m.id === t.mode);

  document.getElementById('gameNameLive').textContent = game?.name || 'Game';
  document.getElementById('modeLive').textContent = mode?.name || 'Tournament';

  // Initialize health bars from player list
  if (t.players && t.players[0]) {
    document.getElementById('p1NameLive').textContent = t.players[0].name;
  }
  if (t.players && t.players[1]) {
    document.getElementById('p2NameLive').textContent = t.players[1].name;
  }

  // Start timer
  let elapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsed++;
    const min = Math.floor(elapsed / 60);
    const sec = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('timerValue').textContent = `${min}:${sec}`;
  }, 1000);

  showView('view-live');
}

async function endTournament() {
  if (!confirm('End this tournament?')) return;
  try {
    await window.fiberquest.tournament.end(currentTournament.id);
    if (timerInterval) clearInterval(timerInterval);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────

// View 4: Results
function showResults(event) {
  const { winner, board } = event;

  document.getElementById('winnerName').textContent = (winner?.name || 'Unknown') + '!';

  // Scoreboard
  const rows = (board || []).map((entry, idx) => {
    const rank = idx + 1;
    const name = entry.name || `Player ${idx + 1}`;
    const score = entry.score || 0;
    const payout = entry.payout ? entry.payout.toFixed(2) : '0.00';
    return `
      <div class="score-row">
        <div class="score-rank">#${rank}</div>
        <div class="score-name">${name}</div>
        <div class="score-value">${score}</div>
        <div class="score-payout">${payout} CKB</div>
      </div>
    `;
  }).join('');

  document.getElementById('scoreboardContent').innerHTML = rows || '<div style="color:var(--muted)">No scores</div>';
  showView('view-results');
}

// ─────────────────────────────────────────────────────────────────────────

// Tournament events
function handleTournamentEvent(event) {
  console.log('[UI] Tournament event:', event.event, event);

  switch (event.event) {
    case 'started':
      console.log('Tournament started!');
      showLive();
      break;

    case 'scores':
      if (event.scores && event.scores.length >= 2) {
        const s1 = event.scores[0];
        const s2 = event.scores[1];

        // Update health bars (simple: map score to health %)
        const h1 = Math.min(100, (s1.score || 0));
        const h2 = Math.min(100, (s2.score || 0));

        document.getElementById('p1Health').style.width = h1 + '%';
        document.getElementById('p1Health').textContent = h1 + '%';
        document.getElementById('p2Health').style.width = h2 + '%';
        document.getElementById('p2Health').textContent = h2 + '%';
      }
      break;

    case 'player_paid':
      // Update the slot status
      console.log('Player paid:', event.name);
      updateWaitingStatus();
      break;

    case 'complete':
      showResults(event);
      break;

    case 'error':
      console.error('Tournament error:', event.message);
      alert('Tournament error: ' + event.message);
      break;
  }
}

function updateWaitingStatus() {
  // Could fetch status and update UI, but for now just show a simple message
  const statEl = document.getElementById('waitStatus');
  if (statEl) {
    statEl.textContent = 'Players joining...';
  }
}

// ─────────────────────────────────────────────────────────────────────────

// Boot
if (window.fiberquest) {
  init();
} else {
  alert('FiberQuest API not available - running in browser mode');
}
</script>

</body>
</html>
